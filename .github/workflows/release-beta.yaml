name: Create beta release

on:
  workflow_dispatch:
    inputs:
      next:
        description: 'The next increment to create the release for'
        required: true
        default: 'minor'
        type: choice
        options:
          - major
          - minor

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Task
        uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611 # v2.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get hash
        shell: bash
        run: |
          HASH=$(git rev-parse --short "$GITHUB_SHA")
          echo "HASH=$HASH" >> $GITHUB_ENV

      - name: Get the next potential version
        id: next-tag
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2.0.0
        with:
          version: latest
          args: next -p beta-${{ env.HASH }} ${{ github.event.inputs.next }}

      - name: Output changes
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2.0.0
        id: changelog
        with:
          version: latest
          args: batch --dry-run -p beta-${{ env.HASH }} ${{ github.event.inputs.next }}

      - name: Save ChangeLog to file
        id: save_changes
        run: |
          tmpfile=$(mktemp)
          echo "${{ steps.changelog.outputs.output }}" > $tmpfile
          echo  "changelog_file=$tmpfile"  >> $GITHUB_OUTPUT
        shell: bash

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          args: release --clean --skip=validate --release-notes ${{ steps.save_changes.outputs.changelog_file }}
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.next-tag.outputs.output }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPATH: ${{ env.GOPATH }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          SKIP_UPLOAD: true

      - name: Upload release
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mach-composer-plugin-hive
          path: dist/*
